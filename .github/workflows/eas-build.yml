name: EAS Production Build

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    name: Build Native Apps
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install Dependencies
        run: npm install

      - name: Build Android App Bundle (Production)
        run: cd mobile && eas build --platform android --profile production --non-interactive --no-wait

      - name: Build iOS IPA (Production)
        run: cd mobile && eas build --platform ios --profile production --non-interactive --no-wait
